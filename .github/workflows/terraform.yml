name: Terraform CI/CD

on:
  push:
    branches:
      - main  # Ya jo bhi branch aap use karte ho
  pull_request:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest  # GitHub runner ka OS

    steps:
      - name: Checkout code
        uses: actions/checkout@v2  # GitHub action jo code checkout kare

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1  # Terraform setup karne ke liye GitHub action

      - name: Terraform Init
        run: terraform init  # Terraform ko initialize kare

      - name: Terraform Plan
        run: terraform plan  # Terraform plan command ko run kare

      - name: Terraform Apply
        run: terraform apply -auto-approve  # Terraform apply command ko run kare

