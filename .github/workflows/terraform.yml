name: Terraform Apply

on:
  push:
    branches:
      - main

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Run Azure CLI script
      uses: azure/CLI@v2
      with:
        inlineScript: |
          az group create --name myResourceGroup --location eastus
        azcliversion: latest
