name: 'Terraform Apply'

on:
  push:
    branches:
      - main  # Workflow will trigger on push to the main branch
  pull_request:
    branches:
      - main  # Workflow will trigger on PR to the main branch

jobs:
  terraform:
    runs-on: ubuntu-latest  # Runner on Ubuntu

    steps:
    # Step 1: Checkout code
    - name: Checkout code
      uses: actions/checkout@v2

    # Step 2: Set up Terraform
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v1
      with:
        terraform_version: '1.4.0'  # Specify your Terraform version

    # Step 3: Initialize Terraform
    - name: Terraform Init
      run: terraform init

    # Step 4: Terraform Plan
    - name: Terraform Plan
      run: terraform plan

    # Step 5: Terraform Apply (This is done only if it's a push to the main branch)
    - name: Terraform Apply
      run: terraform apply -auto-approve
      if: github.ref == 'refs/heads/main'  # Only apply on push to main
