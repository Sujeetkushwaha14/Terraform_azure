name: Terraform CI/CD

on:
  push:
    branches:
      - main  # Aap jo bhi branch use karte ho
  pull_request:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest  # Ye ek Ubuntu runner pe run karega

    steps:
      # Checkout code from GitHub repository
      - name: Checkout code
        uses: actions/checkout@v2

      # Set up Terraform using HashiCorp setup-terraform action
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1

      # Azure Login using the Azure login action
      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}  # Secrets se client-id fetch
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}  # Secrets se client-secret fetch
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}  # Secrets se tenant-id fetch
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}  # Secrets se subscription-id fetch

      # Initialize Terraform
      - name: Terraform Init
        run: terraform init

      # Run Terraform Plan to see the execution plan
      - name: Terraform Plan
        run: terraform plan

      # Apply the Terraform changes
      - name: Terraform Apply
        run: terraform apply -auto-approve
